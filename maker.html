<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maker | Van Hoof &amp; Co</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="images/logo.ico" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .maker-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px 60px;
      background: var(--light-bg);
    }

    .maker-card {
      background: var(--white);
      border-radius: 16px;
      box-shadow: var(--shadow-lg);
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .maker-photo {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--orange);
      margin: 0 auto 24px;
    }

    .maker-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 8px;
    }

    .maker-role {
      font-size: 0.95rem;
      color: var(--orange);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 20px;
    }

    .maker-bio {
      color: var(--text-muted);
      font-size: 0.97rem;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .maker-linkedin {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #0a66c2;
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
      padding: 12px 28px;
      border-radius: 8px;
      transition: background var(--transition);
      text-decoration: none;
    }

    .maker-linkedin:hover {
      background: #004182;
    }

    .maker-back {
      display: inline-block;
      margin-top: 32px;
      color: var(--text-muted);
      font-size: 0.9rem;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .maker-back:hover {
      color: var(--navy);
    }
  </style>
</head>
<body>

<main class="maker-page">
  <div class="maker-card">
    <img src="images/maker.jpg" alt="Foto van de maker" class="maker-photo" />
    <p class="maker-name">Zjef Schaeken</p>
    <p class="maker-role">Website maker</p>
    <p class="maker-bio">
      Deze website werd gemaakt als eerbetoon aan het familiebedrijf Van Hoof &amp; Co.
      Hulp nodig met een website of digitale aanwezigheid? Neem gerust contact op via LinkedIn.
    </p>
    <a href="https://www.linkedin.com/in/zjef-schaeken/" target="_blank" rel="noopener noreferrer" class="maker-linkedin">
      <!-- LinkedIn icon -->
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
      </svg>
      Bekijk mijn LinkedIn
    </a>
    <br />
    <a href="index.html" class="maker-back">← Terug naar de website</a>
  </div>
</main>

</body>
</html>
