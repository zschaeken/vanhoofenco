<svg xmlns="http://www.w3.org/2000/svg" width="600" height="480" viewBox="0 0 600 480">
  <rect width="600" height="480" fill="#2a3266"/>
  <rect x="60" y="60" width="480" height="360" rx="12" fill="#374184" opacity="0.6"/>
  <!-- House outline -->
  <polygon points="300,100 180,200 420,200" fill="none" stroke="#f8873e" stroke-width="4"/>
  <rect x="210" y="200" width="180" height="140" fill="none" stroke="#f8873e" stroke-width="4"/>
  <!-- Door -->
  <rect x="270" y="280" width="60" height="60" rx="4" fill="none" stroke="#f8873e" stroke-width="3"/>
  <!-- Boiler/radiator symbol -->
  <rect x="130" y="250" width="70" height="80" rx="6" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.5"/>
  <line x1="148" y1="265" x2="148" y2="315" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <line x1="165" y1="265" x2="165" y2="315" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <line x1="182" y1="265" x2="182" y2="315" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <!-- Snowflake/AC symbol -->
  <circle cx="420" cy="290" r="30" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <line x1="420" y1="265" x2="420" y2="315" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <line x1="395" y1="290" x2="445" y2="290" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <line x1="403" y1="273" x2="437" y2="307" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <line x1="437" y1="273" x2="403" y2="307" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <!-- Label -->
  <text x="300" y="430" text-anchor="middle" fill="#f8873e" font-family="sans-serif" font-size="14" opacity="0.7">Vervang door eigen foto</text>
</svg>
